<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="sun" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FF6E84"/>
      <stop offset="100%" stop-color="#C180FF"/>
    </radialGradient>
    <linearGradient id="orbitalRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3DC2FD" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#C180FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6E84" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Giant core planet -->
  <circle cx="256" cy="256" r="140" fill="url(#sun)" filter="url(#glow)"/>

  <!-- Orbital Rings -->
  <ellipse cx="256" cy="256" rx="220" ry="60" transform="rotate(-20 256 256)" stroke="url(#orbitalRing)" stroke-width="20" stroke-linecap="round" />
  <ellipse cx="256" cy="256" rx="220" ry="60" transform="rotate(-20 256 256)" stroke="#ffffff" stroke-width="4" opacity="0.6"/>

  <ellipse cx="256" cy="256" rx="240" ry="80" transform="rotate(45 256 256)" stroke="#3DC2FD" stroke-width="3" stroke-dasharray="10 15" opacity="0.4"/>

  <!-- Moons / Accents -->
  <circle cx="120" cy="120" r="15" fill="#3DC2FD" filter="url(#glow)"/>
  <circle cx="400" cy="360" r="25" fill="#00FF41" filter="url(#glow)"/>
  
  <!-- Starbursts -->
  <path d="M420 100 Q430 110 440 100 Q430 90 420 100 Z" fill="#C180FF"/>
  <path d="M430 90 Q440 100 430 110 Q420 100 430 90 Z" fill="#C180FF"/>
  
  <path d="M80 400 Q85 410 90 400 Q85 390 80 400 Z" fill="#FFD700"/>
  <path d="M85 390 Q90 400 85 410 Q80 400 85 390 Z" fill="#FFD700"/>
</svg>
